name: Build macOS app

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-macos:
    name: Universal macOS build
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Rust and macOS targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install frontend and Tauri dependencies
        run: npm install

      - name: Generate macOS icons
        run: npm run icons

      - name: Build universal macOS app and DMG
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target universal-apple-darwin
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: Shot-List-Maker-macOS-[arch]-[bundle]

      - name: Create GitHub Release for version tags
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --generate-notes \
            --title "Shot List Maker $GITHUB_REF_NAME" \
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
